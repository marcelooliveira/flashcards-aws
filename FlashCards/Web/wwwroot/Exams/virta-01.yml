questions:
  - id: dev2026_1
    type: multiple_choice
    question: |
      By 2026, the proliferation of AI-generated code has led to a "Shadow Technical Debt" crisis. A Senior Architect is tasked with maintaining a system where 60% of the codebase was generated by LLMs over the last 24 months. What is the most critical strategy for ensuring long-term maintainability in this environment?
    options:
      - text: Implementing a "no-AI" policy for all new feature development to stabilize the codebase.
        is_correct: false
      - text: Shifting focus from code authorship to automated verification, utilizing AI-driven symbolic execution and property-based testing to validate logic.
        is_correct: true
      - text: Increasing the manual code review time by 50% for every PR generated by an AI agent.
        is_correct: false
      - text: Replacing the entire codebase with a low-code/no-code platform to eliminate the need for manual maintenance.
        is_correct: false
    explanation: |
      Correct: In 2026, the volume of code produced exceeds human review capacity. Senior developers must pivot toward "Verification Engineering"—using automated tools to prove the correctness of AI-generated output rather than reading it line-by-line.
      Incorrect: No-AI policies are regressive and uncompetitive. Manual reviews of massive AI outputs lead to fatigue and missed bugs. Low-code platforms don't solve underlying logic complexity.

  - id: dev2026_2
    type: multiple_choice
    question: |
      With the rise of "Edge-Native" applications in 2026, a team is struggling with state synchronization across 5,000 globally distributed micro-nodes. Which architectural pattern is most effective for ensuring eventual consistency without massive latency penalties?
    options:
      - text: Strict Global Locking (SGL) via a centralized Redis cluster.
        is_correct: false
      - text: Implementing Conflict-free Replicated Data Types (CRDTs) to allow local updates that merge deterministically.
        is_correct: true
      - text: Utilizing a single-leader replication model with a primary database in us-east-1.
        is_correct: false
      - text: Forcing all edge nodes to use WebSockets for real-time synchronous heartbeats to the core.
        is_correct: false
    explanation: |
      Correct: CRDTs allow edge nodes to function offline or with high latency, merging states without conflicts or central coordination.
      Incorrect: Centralized locking or single-leader models reintroduce the latency and bottlenecks that edge computing aims to solve.

  - id: dev2026_3
    type: multiple_choice
    question: |
      A company is facing "API Exhaustion" where thousands of autonomous AI agents are hitting their microservices, causing unpredictable traffic spikes. What is the most resilient way to handle this "Agentic Web" traffic?
    options:
      - text: Standard IP-based rate limiting.
        is_correct: false
      - text: Implementing Proof-of-Work (PoW) headers for non-human requests to disincentivize spamming agents.
        is_correct: false
      - text: Semantic Rate Limiting based on intent and token-cost-modeling for the underlying LLM calls.
        is_correct: true
      - text: Blocking all traffic that does not originate from a known browser User-Agent.
        is_correct: false
    explanation: |
      Correct: Semantic rate limiting understands the value/cost of the AI agent's request rather than just counting packets.
      Incorrect: IP-based limiting is easily circumvented by distributed agents. Blocking AI agents is often business-suicide in 2026.

  - id: dev2026_4
    type: multiple_choice
    question: |
      Quantum-safe cryptography (PQC) has become a compliance requirement in 2026. A Senior Dev must migrate a legacy TLS 1.2 system. What is the primary challenge during this transition?
    options:
      - text: PQC algorithms require significantly larger key sizes and signatures, potentially breaking MTU limits and increasing handshake latency.
        is_correct: true
      - text: PQC algorithms are patented and require expensive licensing.
        is_correct: false
      - text: Most PQC algorithms only work on specialized Quantum hardware.
        is_correct: false
      - text: Python and Java have deprecated support for all encryption to prepare for PQC.
        is_correct: false
    explanation: |
      Correct: Post-Quantum Cryptography algorithms (like Kyber/Dilithium) have much larger footprints, which can lead to packet fragmentation and slower connection times in microservices.
      Incorrect: NIST-approved PQC is open; it runs on classical hardware.

  - id: dev2026_5
    type: multiple_choice
    question: |
      The "Sustainability-First" movement in 2026 requires developers to report the Carbon Intensity of their deployments. How should a team optimize a high-traffic NodeJS application for "Carbon-Awareness"?
    options:
      - text: Moving all workloads to the region with the lowest electricity price.
        is_correct: false
      - text: Implementing "Demand Shifting" to run non-critical batch jobs during periods of high renewable energy availability in the grid.
        is_correct: true
      - text: Using only dark mode in the UI to save user battery life.
        is_correct: false
      - text: Writing all code in Assembly to maximize CPU efficiency.
        is_correct: false
    explanation: |
      Correct: Carbon-aware computing involves scheduling workloads based on the carbon intensity of the local grid at a specific time.
      Incorrect: Low price doesn't always mean low carbon. Dark mode has negligible impact on server-side intensity.

  - id: dev2026_6
    type: multiple_choice
    question: |
      In 2026, "Software Supply Chain Integrity" now mandates an SBOM (Software Bill of Materials) for every build. What is the most effective way to prevent "AI Hallucination Injection" in dependencies?
    options:
      - text: Manually vetting every line of code in the node_modules folder.
        is_correct: false
      - text: Using automated "Policy-as-Code" to block any package that hasn't been cross-referenced against a verified attestation database.
        is_correct: true
      - text: Only using packages created before 2022.
        is_correct: false
      - text: Encrypting the source code so AI cannot read it.
        is_correct: false
    explanation: |
      Correct: Policy-as-Code (like Kyverno or OPA) combined with attestation (Sigstore) ensures only verified, non-hallucinated packages enter the build.
      Incorrect: Manual vetting is impossible at scale; pre-2022 code is full of unpatched vulnerabilities.

  - id: dev2026_7
    type: multiple_choice
    question: |
      Multi-cloud is no longer an option but a 2026 regulatory mandate for "Digital Resilience." A system must failover from AWS to Azure in under 5 minutes. What is the biggest hurdle for NodeJS microservices in this scenario?
    options:
      - text: The V8 engine behaves differently on Azure VMs.
        is_correct: false
      - text: Data gravity and the latency of cross-cloud state replication.
        is_correct: true
      - text: Azure doesn't support NPM.
        is_correct: false
      - text: NodeJS cannot run in Docker containers on multiple clouds.
        is_correct: false
    explanation: |
      Correct: Moving the application code is easy (containers); moving terabytes of synchronized state across cloud providers without breaking consistency is the core challenge.
      Incorrect: V8 is consistent; NPM and Docker are cloud-agnostic.

  - id: dev2026_8
    type: multiple_choice
    question: |
      "Prompt Engineering" has evolved into "LLM Orchestration." How should a Senior Dev manage the non-deterministic nature of AI model outputs in a production financial app?
    options:
      - text: Using a "Structured Output" enforcement layer (like JSON Schema or Pydantic) and a retry logic with temperature 0.
        is_correct: true
      - text: Telling the AI "it is very important to be correct" in the system prompt.
        is_correct: false
      - text: Hard-coding every possible response the AI could give.
        is_correct: false
      - text: Avoiding LLMs entirely and using only Regex.
        is_correct: false
    explanation: |
      Correct: Determinism in 2026 is achieved via schemas that force models to follow strict formats, combined with low temperature settings.
      Incorrect: System prompt "emotional" pleading is unreliable.

  - id: dev2026_9
    type: multiple_choice
    question: |
      WebAssembly (Wasm) is widely used in 2026 for server-side logic. Why would a NodeJS team choose to move a heavy calculation module into Wasm?
    options:
      - text: To bypass the NodeJS Event Loop entirely for true multi-threaded parallel execution.
        is_correct: true
      - text: Because Wasm code is easier to write than Javascript.
        is_correct: false
      - text: To allow the code to run only on the client side.
        is_correct: false
      - text: Wasm is the only way to connect to a PostgreSQL database.
        is_correct: false
    explanation: |
      Correct: Wasm (via WASI) allows high-performance, sandboxed, multi-threaded execution that can significantly outperform standard JS for CPU-bound tasks.
      Incorrect: Wasm is generally harder to write (C++/Rust/Zig).

  - id: dev2026_10
    type: multiple_choice
    question: |
      "Human-in-the-loop" (HITL) architecture is becoming standard for high-stakes AI decisions. How should this be architected for a 2026 microservice?
    options:
      - text: The service pauses the thread until a human clicks "Approve" in an email.
        is_correct: false
      - text: Using an asynchronous state machine (like AWS Step Functions) that persists the AI's "proposed" state and emits an event for human intervention.
        is_correct: true
      - text: Making the user wait on the loading screen for 10-15 minutes.
        is_correct: false
      - text: Using a synchronous REST call to a Human Dashboard.
        is_correct: false
    explanation: |
      Correct: Asynchronous workflows are required because human latency is measured in minutes/hours, while service timeouts are measured in seconds.
      Incorrect: Pausing threads leads to resource exhaustion. Synchronous REST is not feasible for human response times.

  - id: aws_node_1
    type: multiple_choice
    question: |
      A NodeJS Lambda function is experiencing high "Cold Start" times, impacting a critical customer-facing API. The function is 50MB and uses several heavy AWS SDK clients. What is the most effective senior-level optimization?
    options:
      - text: Increase the Lambda memory to 10GB, as this linearly increases CPU and initialization speed.
        is_correct: false
      - text: Use the AWS SDK v3 with modular imports and implement "Lambda Provisioned Concurrency".
        is_correct: true
      - text: Switch from NodeJS to Python, as Python has no cold starts.
        is_correct: false
      - text: Wrap the entire function in a single try-cache block.
        is_correct: false
    explanation: |
      Correct: SDK v3 allows importing only the needed sub-modules (reducing package size), and Provisioned Concurrency keeps functions warm.
      Incorrect: Memory increases help but don't solve the root size/init issue. Python also has cold starts.

  - id: aws_node_2
    type: multiple_choice
    question: |
      Your NodeJS microservice needs to handle 100,000 messages per second from an SQS queue. The current implementation is hitting the "downstream" database too hard. How do you implement "Backpressure" in a Lambda-based consumer?
    options:
      - text: Increase the BatchSize to 10,000.
        is_correct: false
      - text: Configure "Reserved Concurrency" on the Lambda to limit the number of concurrent executions.
        is_correct: true
      - text: Use setInterval inside the Lambda to slow down the processing.
        is_correct: false
      - text: Move the database to a larger instance type.
        is_correct: false
    explanation: |
      Correct: Reserved Concurrency acts as a throttle, ensuring the Lambda doesn't scale beyond what the downstream database can handle.
      Incorrect: Large batches might make the spike worse. setInterval is an anti-pattern in Lambda as you pay for idle time.

  - id: aws_node_3
    type: multiple_choice
    question: |
      When using NodeJS on AWS Fargate, how should you handle the SIGTERM signal to ensure "Graceful Shutdown" during a deployment?
    options:
      - text: Immediately call process.exit(0).
        is_correct: false
      - text: Stop accepting new connections, finish pending requests, and close database pool connections before exiting.
        is_correct: true
      - text: Fargate handles this automatically; no code is needed.
        is_correct: false
      - text: Use a while(true) loop to wait for the signal.
        is_correct: false
    explanation: |
      Correct: Graceful shutdown prevents dropping active user requests and ensures DB connections aren't left "hanging."
      Incorrect: process.exit(0) kills the process immediately, potentially cutting off active requests.

  - id: aws_node_4
    type: multiple_choice
    question: |
      A senior developer chooses to use "AppSync" with JS Resolvers instead of Lambda for a high-traffic microservice. What is the primary architectural benefit of this choice?
    options:
      - text: JS Resolvers allow you to use any NPM package.
        is_correct: false
      - text: It eliminates the "Cold Start" and execution overhead of Lambda, as resolvers run directly on the AppSync engine.
        is_correct: true
      - text: It makes the code easier to debug locally.
        is_correct: false
      - text: It allows for unlimited execution time.
        is_correct: false
    explanation: |
      Correct: AppSync JS resolvers run in a high-performance environment without the overhead of spinning up a full Lambda container.
      Incorrect: JS Resolvers do NOT support all NPM packages (they have a restricted runtime).

  - id: aws_node_5
    type: multiple_choice
    question: |
      You are designing a distributed tracing strategy for a NodeJS microservice chain using AWS X-Ray. What is required to maintain the trace across an asynchronous SQS boundary?
    options:
      - text: AWS X-Ray automatically links SQS messages without extra code.
        is_correct: false
      - text: You must manually extract the AWSTraceHeader from the SQS message metadata and inject it into the segment of the consuming Lambda.
        is_correct: true
      - text: Use a global variable to store the Trace ID.
        is_correct: false
      - text: X-Ray only works with synchronous REST calls.
        is_correct: false
    explanation: |
      Correct: SQS doesn't automatically propagate the context; the consumer must read the header and "resume" the trace.
      Incorrect: X-Ray supports async, but not magically across all services.

  - id: aws_node_6
    type: multiple_choice
    question: |
      In a NodeJS AWS Lambda environment, what is the best practice for managing secrets like API keys?
    options:
      - text: Store them in the process.env directly in the SAM/CDK template.
        is_correct: false
      - text: Fetch from AWS Secrets Manager inside the handler function on every request.
        is_correct: false
      - text: Fetch from AWS Secrets Manager *outside* the handler (globally) and cache them, or use the "AWS Parameters and Secrets Lambda Extension."
        is_correct: true
      - text: Hard-code them in a config.json file.
        is_correct: false
    explanation: |
      Correct: Caching outside the handler or using the Extension reduces latency and costs associated with calling Secrets Manager on every execution.
      Incorrect: process.env in templates is insecure (plain text in console).

  - id: aws_node_7
    type: multiple_choice
    question: |
      Your NodeJS microservice uses DynamoDB. You need to implement an "Inbox Pattern" where messages are processed exactly once. Which DynamoDB feature is most helpful?
    options:
      - text: Scan with a filter expression.
        is_correct: false
      - text: TransactWriteItems with a attribute_not_exists condition on a unique message ID.
        is_correct: true
      - text: Global Secondary Indexes (GSI).
        is_correct: false
      - text: Eventually consistent reads.
        is_correct: false
    explanation: |
      Correct: Transactions and conditional writes ensure that if two processes try to "claim" the same message, only one succeeds.
      Incorrect: GSIs are for querying, not for atomicity.

  - id: aws_node_8
    type: multiple_choice
    question: |
      A NodeJS microservice running on ECS needs to communicate with another microservice. To minimize latency and avoid managing Load Balancers, which AWS feature should be used?
    options:
      - text: Public IP addresses for every container.
        is_correct: false
      - text: AWS Cloud Map for Service Discovery.
        is_correct: true
      - text: Hard-coding the internal DNS of the EC2 instances.
        is_correct: false
      - text: Sending all traffic through an Internet Gateway.
        is_correct: false
    explanation: |
      Correct: Cloud Map allows services to discover each other via custom DNS names (e.g., orders.service.local) without an ELB.
      Incorrect: ELBs add cost/latency; hard-coding IPs is impossible in dynamic container environments.

  - id: aws_node_9
    type: multiple_choice
    question: |
      Which NodeJS version management strategy is recommended for enterprise AWS Lambda deployments to ensure dev/prod parity?
    options:
      - text: Using latest in the AWS console.
        is_correct: false
      - text: Bundling the specific NodeJS runtime via Docker Container Images (ECR).
        is_correct: true
      - text: Relying on the developer's local nvm version during the zip upload.
        is_correct: false
      - text: Lambda automatically updates to the safest version; no strategy is needed.
        is_correct: false
    explanation: |
      Correct: Container images for Lambda provide the highest level of control over the OS, libraries, and NodeJS version.
      Incorrect: latest is not an option for Lambda runtimes; zip uploads can lead to "it works on my machine" issues.

  - id: aws_node_10
    type: multiple_choice
    question: |
      When building a "Fan-out" architecture using SNS and multiple NodeJS Lambda subscribers, how do you ensure one failing subscriber doesn't block the others?
    options:
      - text: SNS handles this natively; it retries each subscription independently according to its own "Retry Policy."
        is_correct: true
      - text: Wrap all subscribers in a single large Lambda.
        is_correct: false
      - text: Use a single SQS queue for all subscribers.
        is_correct: false
      - text: Turn off retries in SNS.
        is_correct: false
    explanation: |
      Correct: SNS isolation is a core benefit; a failure in "Email Service" subscriber won't stop "Analytics Service" subscriber from receiving the message.
      Incorrect: A single SQS queue would lead to "Competition" for messages, not fan-out.

  - id: ts_1
    type: multiple_choice
    question: |
      A Senior Developer is building a highly generic API client. They need to create a type that takes an object and returns a new type where all properties are "read-only" and "non-nullable", but only for properties that start with the prefix "data_". Which TS feature is required?
    options:
      - text: Interface Merging.
        is_correct: false
      - text: Mapped Types with Key Remapping (using as) and Template Literal Types.
        is_correct: true
      - text: Method Overloading.
        is_correct: false
      - text: The Record<string, unknown> utility type.
        is_correct: false
    explanation: |
      Correct: Template literal types (data_${string}) combined with mapped types ([K in keyof T as K extends ... ? K : never]) allow for precise manipulation of keys based on string patterns.
      Incorrect: Interface merging only combines definitions. Record is too broad for specific key manipulation.

  - id: ts_2
    type: multiple_choice
    question: |
      You have a union type type Transport = 'Train' | 'Plane' | 'Car'. You want to ensure that a switch statement handles all cases, such that if a new transport is added to the union, the code fails to compile. What is this pattern called?
    options:
      - text: Nominal Typing.
        is_correct: false
      - text: Exhaustiveness Checking using the never type.
        is_correct: true
      - text: Type Assertion.
        is_correct: false
      - text: Optional Chaining.
        is_correct: false
    explanation: |
      Correct: Assigning the "default" case of a switch to a variable of type never causes a compile error if the union is not fully covered.
      Incorrect: Nominal typing is about unique identities (not supported natively in TS); Type assertion bypasses safety.

  - id: ts_3
    type: multiple_choice
    question: |
      In a large TypeScript project, you notice the "any" type is being used frequently in legacy code. Which tsconfig.json flag is most critical to enable to begin enforcing stricter standards?
    options:
      - text: strictNullChecks
        is_correct: false
      - text: noImplicitAny
        is_correct: true
      - text: skipLibCheck
        is_correct: false
      - text: target.. "ESNext"
        is_correct: false
    explanation: |
      Correct: noImplicitAny forces developers to explicitly type variables rather than letting them default to a silent any.
      Incorrect: strictNullChecks deals with null/undefined, not the any type specifically.

  - id: ts_4
    type: multiple_choice
    question: |
      What is the difference between type and interface in modern TypeScript (v5+) regarding performance and extensibility?
    options:
      - text: Interfaces are generally faster for the compiler to check due to internal caching of property maps, especially with declaration merging.
        is_correct: true
      - text: Types are always faster because they are simpler.
        is_correct: false
      - text: There is no difference; they are exactly the same.
        is_correct: false
      - text: Interfaces cannot be used for objects.
        is_correct: false
    explanation: |
      Correct: The TS compiler optimizes interfaces better for recursive checks and merging. Types are better for unions and complex transformations.
      Incorrect: While they look similar, the underlying "Type Checker" handles them differently for performance.

  - id: ts_5
    type: multiple_choice
    question: |
      A function accepts unknown. You want to check if the input is an object with a specific property id that is a string, in a way that "narrows" the type for the rest of the block. What should you use?
    options:
      - text: (val as any).id !== undefined
        is_correct: false
      - text: A custom Type Guard function using the is keyword.
        is_correct: true
      - text: typeof val === 'object'
        is_correct: false
      - text: A try-catch block.
        is_correct: false
    explanation: |
      Correct: function isItem(obj: any): obj is {id: string} allows TS to treat the variable as that specific type inside the if block.
      Incorrect: as any loses all safety. typeof val === 'object' doesn't check the internal properties like id.

  - id: ts_6
    type: multiple_choice
    question: |
      What does the override keyword (introduced in TS 4.3) accomplish in a class-based microservice?
    options:
      - text: It allows a function to be called with different arguments.
        is_correct: false
      - text: It ensures that a method in a subclass explicitly exists in the base class, preventing accidental "shadowing" or broken overrides during refactoring.
        is_correct: true
      - text: It replaces the private keyword.
        is_correct: false
      - text: It makes a method immutable.
        is_correct: false
    explanation: |
      Correct: If the base class method is renamed or deleted, the subclass using override will throw a compiler error, preventing silent bugs.
      Incorrect: This is distinct from "Overloading."

  - id: ts_7
    type: multiple_choice
    question: |
      You need to extract the return type of an asynchronous function fetchData. Which combination of utility types is correct?
    options:
      - text: ReturnType<typeof fetchData>
        is_correct: false
      - text: Awaited<ReturnType<typeof fetchData>>
        is_correct: true
      - text: Promise<ReturnType<fetchData>>
        is_correct: false
      - text: Unwrap<fetchData>
        is_correct: false
    explanation: |
      Correct: ReturnType gets the Promise<T>, and Awaited unwraps the Promise to get T.
      Incorrect: ReturnType alone would leave you with the Promise wrapper.

  - id: ts_8
    type: multiple_choice
    question: |
      What is "Satisfies" operator (satisfies) used for in TypeScript 4.9+?
    options:
      - text: It forces a variable to be exactly one type and nothing else.
        is_correct: false
      - text: It validates that an expression matches a type but *preserves* the most specific type of the expression for inference.
        is_correct: true
      - text: It is a synonym for as.
        is_correct: false
      - text: It checks if a user is logged in.
        is_correct: false
    explanation: |
      Correct: For example, if you have a palette object, satisfies Record<string, string> ensures all keys are strings, but still remembers that palette.red specifically exists.
      Incorrect: Using as or a type annotation would widen the type and lose specific property knowledge.

  - id: ts_9
    type: multiple_choice
    question: |
      How do you implement "Nominal" or "Branded" types in TypeScript to prevent passing a UserId into a function that expects a ProductId (when both are just strings)?
    options:
      - text: TypeScript does not support this.
        is_correct: false
      - text: By adding a private/unique property (a "brand") to the type definition, e.g., type UserId = string & { __brand.. 'UserId' }.
        is_correct: true
      - text: By using the enum keyword for all IDs.
        is_correct: false
      - text: By using Uppercase<string>.
        is_correct: false
    explanation: |
      Correct: Branded types allow for structural typing to act like nominal typing, providing extra safety for primitive types.
      Incorrect: Enums for IDs are hard to manage and don't scale well with dynamic data.

  - id: ts_10
    type: multiple_choice
    question: |
      A project uses "Project References" in its tsconfig.json. What is the primary benefit for a Senior Developer managing a monorepo?
    options:
      - text: It makes the final Javascript bundle smaller.
        is_correct: false
      - text: It allows for faster incremental builds by only recompiling changed sub-projects and utilizing cached metadata (.tsbuildinfo).
        is_correct: true
      - text: It allows mixing Javascript and Typescript in the same file.
        is_correct: false
      - text: It automatically installs missing NPM packages.
        is_correct: false
    explanation: |
      Correct: Project references enable "Logical Separation" and "Build Optimization" which are critical for large-scale monorepos.
      Incorrect: It doesn't affect bundle size; that is a job for the bundler (esbuild/webpack).

