  - id: q54
    type: multiple_choice
    question: "What is the danger of using 'Task.WhenAll' with thousands of independent tasks in a high-concurrency gateway?"
    options:
      - text: "It can lead to 'Continuation Hell' and massive memory pressure if the tasks allocate large objects before completion."
        is_correct: true
      - text: "Task.WhenAll only supports a maximum of 10 tasks."
        is_correct: false
      - text: "It causes the server to reboot if one task fails."
        is_correct: false
      - text: "It forces all tasks to run on a single CPU core."
        is_correct: false
    explanation: "While WhenAll is useful, creating thousands of Task objects simultaneously can spike memory. For extreme scale, using a Channel or a Semaphore to limit concurrency is safer."
    tags: [async, scalability, memory]
    difficulty: hard
    points: 9

  - id: q55
    type: multiple_choice
    question: "How does the 'System.IO.Pipelines' library differ from traditional 'Streams' for high-performance I/O?"
    options:
      - text: "It manages memory buffers automatically and allows for 'zero-copy' parsing by passing Spans of memory between producers and consumers."
        is_correct: true
      - text: "It is simply a wrapper for File.ReadAllText."
        is_correct: false
      - text: "It requires a dedicated GPU to process network data."
        is_correct: false
      - text: "It only works with physical hardware pipes in industrial servers."
        is_correct: false
    explanation: "Pipelines reduce complexity and increase performance by handling buffer management, reducing the need for the programmer to manage complex byte array logic."
    tags: [io, pipelines, performance]
    difficulty: hard
    points: 10

  - id: q56
    type: multiple_choice
    question: "What is 'PGO' (Profile-Guided Optimization) in .NET 8?"
    options:
      - text: "A JIT optimization where the runtime collects data about code execution to re-compile hot methods into even more efficient machine code."
        is_correct: true
      - text: "A tool to profile the developer's productivity."
        is_correct: false
      - text: "A database indexing strategy used in SQL Server."
        is_correct: false
      - text: "A way to compress DLL files for faster downloads."
        is_correct: false
    explanation: "Dynamic PGO in .NET 8 allows the JIT to observe which branches are taken most often or which types are used in interfaces, generating 'de-virtualized' and highly optimized code."
    tags: [jit, runtime, pgo]
    difficulty: hard
    points: 9

  - id: q57
    type: multiple_choice
    question: "Analyze the code below. Why is 'MemoryCache' often preferred over a 'ConcurrentDictionary' for caching in mission-critical web apps?"
    code: |
      var cache = new MemoryCache(new MemoryCacheOptions());
    options:
      - text: "MemoryCache provides built-in expiration policies (TTL) and memory pressure eviction, which prevents OutOfMemory exceptions."
        is_correct: true
      - text: "MemoryCache is faster than Dictionary for every lookup."
        is_correct: false
      - text: "ConcurrentDictionary cannot be used with strings."
        is_correct: false
      - text: "MemoryCache automatically syncs with Redis without extra code."
        is_correct: false
    explanation: "Without eviction/expiration (like in a Dictionary), a cache grows indefinitely. MemoryCache manages the lifecycle of items to keep the system stable."
    tags: [caching, resilience, reliability]
    difficulty: medium
    points: 7

  - id: q58
    type: multiple_choice
    question: "In .NET 8, what is the primary purpose of 'TimeProvider'?"
    options:
      - text: "To enable easy mocking and testing of time-dependent logic (Delays, Task.Delay, CancellationTokenSource)."
        is_correct: true
      - text: "To synchronize the server clock with an atomic clock in AWS."
        is_correct: false
      - text: "To calculate the travel time of light in fiber optic cables."
        is_correct: false
      - text: "To replace the 'DateTime' struct entirely."
        is_correct: false
    explanation: "TimeProvider is an abstraction that makes unit testing logic involving timers or timeouts much simpler and more deterministic."
    tags: [dot-net-8, testing, architecture]
    difficulty: medium
    points: 6

  - id: q59
    type: multiple_choice
    question: "Which GC (Garbage Collector) mode is usually best for a high-traffic Web API running on a server with 32 cores?"
    options:
      - text: "Server GC (System.GC.Server=true)"
        is_correct: true
      - text: "Workstation GC"
        is_correct: false
      - text: "Background GC (only if running on Windows 7)"
        is_correct: false
      - text: "No GC (Zero Garbage mode)"
        is_correct: false
    explanation: "Server GC creates one heap and one GC thread per logical processor, allowing for parallel collections and much higher throughput on multi-core systems."
    tags: [gc, scalability, runtime]
    difficulty: medium
    points: 8

  - id: q60
    type: multiple_choice
    question: "What is the purpose of the 'Inlining' optimization done by the JIT?"
    options:
      - text: "Replacing a method call with the actual body of the method to eliminate call overhead and enable further optimizations."
        is_correct: true
      - text: "Writing code in a single line to reduce file size."
        is_correct: false
      - text: "Converting C# code into Javascript for the browser."
        is_correct: false
      - text: "Forcing all variables to be stored in the CPU registers."
        is_correct: false
    explanation: "Inlining removes the cost of pushing/popping from the stack during a method call, which is critical for small, frequently called helper methods."
    tags: [jit, performance, optimization]
    difficulty: medium
    points: 7