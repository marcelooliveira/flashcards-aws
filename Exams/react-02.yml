    points: 5

  - id: q35
    type: multiple_choice
    question: "In this MUI DataGrid usage, why might performance degrade when the parent renders?"
    code: |
      function MyTable({ rows }) {
        const columns = [
          { field: 'id', headerName: 'ID' },
          { field: 'name', headerName: 'Name' }
        ];
        return <DataGrid rows={rows} columns={columns} />;
      }
    options:
      - text: "The 'columns' array is redefined on every render, which might trigger unnecessary heavy re-renders in the DataGrid."
        is_correct: true
      - text: "DataGrid does not support arrays defined inside the component."
        is_correct: false
      - text: "The 'field' property is reserved and cannot be used in arrays."
        is_correct: false
      - text: "MUI requires all columns to be fetched from an API."
        is_correct: false
    explanation: "Complex MUI components often use referential equality for props. Moving 'columns' outside the component or using useMemo is a best practice."
    tags: [mui, performance, memoization]
    difficulty: medium
    points: 7

  - id: q36
    type: multiple_choice
    question: "What is the purpose of 'forwardRef' in the following scenario?"
    code: |
      const MyInput = forwardRef((props, ref) => (
        <input {...props} ref={ref} />
      ));
    options:
      - text: "It allows the parent component to obtain a direct reference to the underlying DOM input element."
        is_correct: true
      - text: "It is used to automatically translate the input text."
        is_correct: false
      - text: "It forwards the component to a different route."
        is_correct: false
      - text: "It increases the speed of keystroke logging."
        is_correct: false
    explanation: "forwardRef is necessary when a parent needs to access a DOM node or a child's internal component ref."
    tags: [refs, forwardRef, dom]
    difficulty: medium
    points: 7

  - id: q37
    type: multiple_choice
    question: "Using React Query, what does the 'enabled' option do in this snippet?"
    code: |
      const { data } = useQuery({
        queryKey: ['user', id],
        queryFn: () => fetchUser(id),
        enabled: !!id
      });
    options:
      - text: "It prevents the query from running automatically if 'id' is null or undefined."
        is_correct: true
      - text: "It enables high-speed data transfer from the .NET backend."
        is_correct: false
      - text: "It encrypts the 'id' before sending the request."
        is_correct: false
      - text: "It tells React Query to use LocalStorage instead of cache."
        is_correct: false
    explanation: "The 'enabled' property is used for 'Dependent Queries', ensuring the fetch only happens when the necessary criteria are met."
    tags: [react-query, data-fetching, logic]
    difficulty: medium
    points: 8
    diagram: |
      graph TD
      A[Check 'enabled' value] --> B{True?}
      B -- Yes --> C[Execute queryFn]
      B -- No --> D[Stay in 'idle' state]

  - id: q38
    type: multiple_choice
    question: "Which pattern is being used here to share logic between components?"
    code: |
      function withLogger(WrappedComponent) {
        return function(props) {
          useEffect(() => { console.log('Rendered'); }, []);
          return <WrappedComponent {...props} />;
        }
      }
    options:
      - text: "HOC (Higher-Order Component)"
        is_correct: true
      - text: "Render Props"
        is_correct: false
      - text: "Compound Components"
        is_correct: false
      - text: "Redux Thunk"
        is_correct: false
    explanation: "A Higher-Order Component is a function that takes a component and returns a new component with added functionality."
    tags: [patterns, hoc, architecture]
    difficulty: medium
    points: 7

  - id: q39
    type: multiple_choice
    question: "What is the issue with using 'index' as a key in this dynamically filtering list?"
    code: |
      {items.map((item, index) => (
        <ListItem key={index} text={item.text} />
      ))}
    options:
      - text: "If items are reordered or removed, React may reuse the wrong component state for the wrong data."
        is_correct: true
      - text: "TypeScript will throw a 'Type Index' error."
        is_correct: false
      - text: "The list will only render the first three items."
        is_correct: false
      - text: "Material UI lists do not support numerical keys."
        is_correct: false
    explanation: "Keys should be stable, predictable, and unique. Using index causes issues during reconciliation when the list order changes."
    tags: [fundamentals, lists, performance]
    difficulty: easy
    points: 6

  - id: q40
    type: multiple_choice
    question: "In Next.js 13/14 (App Router), what is the default rendering behavior for components inside the 'app' directory?"
    code: |
      // app/dashboard/page.tsx
      export default function Page() {
        return <h1>Dashboard</h1>;
      }
    options:
      - text: "Server Components (rendered on the server by default)."
        is_correct: true
      - text: "Client Components (rendered in the browser by default)."
