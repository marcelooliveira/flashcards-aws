      - text: "Static HTML files without any React functionality."
        is_correct: false
      - text: "They are automatically converted to .NET WebForms."
        is_correct: false
    explanation: "In the App Router, all components are Server Components by default unless you add the 'use client' directive at the top."
    tags: [nextjs, server-components, architecture]
    difficulty: medium
