questions:
  - id: q01
    type: multiple_choice
    question: "An Amazon Connect Contact Flow invokes an AWS Lambda function to fetch customer data. If the backend API called by the Lambda takes 9 seconds to respond, what will occur within the interaction flow?"
    code: |
      // AWS Lambda Handler Context
      exports.handler = async (event) => {
          // Contact Flow waits synchronously
          const customerData = await fetchFromSlowLegacyAPI(event.Details.ContactData.Attributes.CustomerId); 
          return { CustomerStatus: customerData.status };
      };
    options:
      - text: "The Contact Flow will wait up to 15 minutes for the Lambda execution to complete."
        is_correct: false
      - text: "The Contact Flow will automatically take the 'Error' branch due to a hard 8-second timeout limit for Lambda invocations."
        is_correct: true
      - text: "Amazon Connect will automatically retry the Lambda invocation three times before moving to the next block."
        is_correct: false
      - text: "The call will be dropped immediately without entering any failure branches."
        is_correct: false
    explanation: "Amazon Connect has a strict, non-configurable timeout of 8 seconds for synchronous AWS Lambda invocations. If the function exceeds this limit, Connect triggers the 'Error' branch of the invoke block."
    tags: [aws-lambda, amazon-connect, architecture, timeouts]
    difficulty: hard
    points: 8
    diagram: |
      graph TD
      A[Connect Flow] -->|Invoke Lambda| B(Lambda Execution)
      B -->|Ticks past 8s| C[Connect Hard Timeout]
      C -->|Route Execution| D[Error Branch]

  - id: q02
    type: multiple_choice
    question: "During a high-volume product launch, thousands of concurrent callers trigger an Amazon Connect flow that invokes a Lambda function to verify account status. How should you design the architecture to prevent 'ThrottlingException' errors?"
    code: |
      # Infrastructure as Code (Terraform Snippet)
      resource "aws_lambda_function" "connect_lookup" {
        function_name = "connect-customer-lookup"
        runtime       = "nodejs18.x"
        # ??? Configuration needed to guarantee capacity without exhausting regional pools
      }
    options:
      - text: "Configure 'Reserved Concurrency' for the specific Lambda function to guarantee an allocation of execution slots."
        is_correct: true
      - text: "Increase the timeout of the Lambda function to 15 minutes to allow requests to queue up."
        is_correct: false
      - text: "Wrap the Lambda invocation within an Amazon SQS FIFO queue directly inside the Contact Flow visual designer."
        is_correct: false
      - text: "Deploy the Lambda function in multiple AWS Regions and use Route 53 to load-balance the voice traffic."
        is_correct: false
    explanation: "Setting Reserved Concurrency guarantees that the critical contact center Lambda has a dedicated pool of execution slots to handle spikes, while simultaneously preventing it from scale-exhausting the entire AWS account's regional concurrency pool."
    tags: [aws-lambda, scalability, concurrency, infrastructure]
    difficulty: hard
    points: 9
    diagram: |
      graph LR
      A[Spike: 2000 Calls] --> B[Amazon Connect]
      B --> C{Lambda Pool}
      C -->|Reserved Concurrency Slots| D[Successful Execution]
      C -->|Exceeded Pool Limit| E[Graceful Error Flow]

  - id: q03
    type: multiple_choice
    question: "You are designing an integration between Amazon Connect and an external CRM. You want to pass the customer's input ('Account Number') captured via DTMF to an AWS Lambda function. Which JSON path should you use to extract this value inside the Lambda event object?"
    code: |
      {
        "Details": {
          "ContactData": {
            "Attributes": {},
            "MediaProperties": {},
            "SystemEndpoint": {}
          },
          "Parameters": {
            "CustomerAccountNumber": "12345"
          }
        },
        "Name": "ContactFlowEvent",
        "Program": "Amazon Connect"
      }
    options:
      - text: "event.Details.ContactData.Attributes.CustomerAccountNumber"
        is_correct: false
      - text: "event.Details.Parameters.CustomerAccountNumber"
        is_correct: true
      - text: "event.Parameters.CustomerAccountNumber"
        is_correct: false
      - text: "event.ContactData.CustomerAccountNumber"
        is_correct: false
    explanation: "When you pass parameters explicitly into an AWS Lambda function from an Amazon Connect 'Invoke AWS Lambda function' block, they are populated under the `event.Details.Parameters` object schema."
    tags: [aws-lambda, integrations, json, amazon-connect]
    difficulty: medium
    points: 7

  - id: q04
    type: multiple_choice
    question: "To support 'Spec-Driven Development' (SDD) and Shift-Left testing, your team needs to mock Amazon Connect payloads locally to test the Node.js/Python Lambda integrations in a CI/CD pipeline. Which approach represents the best practice?"
    code: |
      // Test suite setup for contact center workflow
      describe('Connect Lambda Integration Tests', () => {
        it('should route premium tier users correctly', async () => {
          const mockEvent = loadFixture('connect_event_premium.json');
          const response = await handler(mockEvent);
          expect(response.Result).toBe('PremiumQueue');
        });
      });
    options:
      - text: "Hardcode test data into the Lambda code itself, checking an environment variable like 'IS_LOCAL_TEST'."
        is_correct: false
      - text: "Maintain updated JSON schema fixtures representing official Amazon Connect event structures, and run unit tests locally using tools like Jest or PyTest."
        is_correct: true
      - text: "Deploy code directly to a personal AWS sandbox account for every local code change to run real end-to-end tests."
        is_correct: false
      - text: "Use Amazon Connect's visual editor to write assertions inside the live environment routing flows."
        is_correct: false
    explanation: "Shift-left testing relies on validating contracts early. Isolating core business logic by passing structural JSON fixtures to local unit tests ensures instant feedback without cloud latency or deployment overhead."
    tags: [testing, shift-left, quality, continuous-integration]
    difficulty: medium
    points: 8

