  - id: q11
    type: multiple_choice
    question: "You are designing an Amazon Connect Contact Flow that passes customer data to an AWS Lambda function. To comply with local financial data privacy regulations (like LGPD/GDPR), you must ensure that sensitive variables are not persisted in the Amazon Connect interaction logs. How should this be handled?"
    code: |
      // AWS Lambda return payload structure
      exports.handler = async (event) => {
          return {
              // How should sensitive variables be structured or flagged?
              CustomerBalance: "5420.50",
              AccountType: "Premium"
          };
      };
    options:
      - text: "Set the 'SensitiveData' flag to true inside the Lambda function's environment variables."
        is_correct: false
      - text: "Use the 'Set contact attributes' block in the Contact Flow and explicitly toggle the 'Log value' option to disabled for those specific attributes."
        is_correct: true
      - text: "Encrypt the entire Lambda return payload using an asymmetric AWS KMS key before passing it back to Connect."
        is_correct: false
      - text: "Contact attributes are never logged by Amazon Connect, so no action is required."
        is_correct: false
    explanation: "Amazon Connect logs Contact Flow execution details to CloudWatch. To prevent PII or financial data leakage, you must explicitly configure specific contact attributes to not be logged by toggling off the 'Log value' configuration inside the flow designer."
