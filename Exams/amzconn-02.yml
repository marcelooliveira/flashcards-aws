    difficulty: medium
    points: 8

  - id: q12
    type: multiple_choice
    question: "During a hyper-care support phase, you notice a high volume of 'AccessDeniedException' errors in your Lambda function logs when it tries to publish status updates to an Amazon SNS topic triggered by an Amazon Connect flow. What is the most likely root cause?"
    code: |
      # CloudWatch Log Error Snippet
      {
          "errorMessage": "User: arn:aws:sts::123456789012:assumed-role/connect-lambda-execution-role/connect-lookup is not authorized to perform: sns:Publish on resource...",
          "errorType": "AccessDeniedException"
      }
    options:
      - text: "The Amazon SNS topic is encrypted with a KMS key that the Lambda execution role does not have permissions to use."
        is_correct: false
      - text: "The AWS Lambda execution IAM role lacks the 'sns:Publish' action in its resource policy."
        is_correct: true
      - text: "Amazon Connect does not have cross-account permissions to access the SNS topic."
        is_correct: false
      - text: "The Lambda function's timeout is too low to establish a handshake with the SNS endpoint."
        is_correct: false
    explanation: "AWS Lambda functions rely entirely on their assigned Execution Role (IAM) to interact with other AWS services. An AccessDeniedException explicitly indicates that the IAM policy attached to that role is missing the required action permission (sns:Publish) for the targeted resource."
    tags: [iam, security, troubleshooting, hyper-care]
    difficulty: medium
    points: 7

  - id: q13
    type: multiple_choice
    question: "Your application stack uses an Amazon API Gateway endpoint proxying to an AWS Lambda function to provide data to Amazon Connect. During sudden traffic spikes, you want to prevent cold starts from causing Amazon Connect 8-second execution timeouts. Which Lambda feature should you configure?"
    code: |
      # Infrastructure as Code (Terraform Snippet)
      resource "aws_lambda_provisioned_concurrency_config" "connect_lambda_concurrency" {
        function_name        = aws_lambda_function.connect_lookup.function_name
        qualifier            = aws_lambda_alias.prod.name
        # ??? Configuration parameter to keep environments warm
        provisioned_concurrent_executions = 20
      }
    options:
      - text: "Reserved Concurrency"
        is_correct: false
      - text: "Provisioned Concurrency"
        is_correct: true
      - text: "Event Source Mapping"
        is_correct: false
      - text: "Lambda Layers warm-up cron"
        is_correct: false
    explanation: "Provisioned Concurrency initializes a requested number of runtime environments ahead of time. This guarantees that functions can respond immediately with ultra-low latency, completely eliminating cold start delays during sudden contact center volume spikes."
    tags: [aws-lambda, performance, latency, infrastructure]
    difficulty: hard
    points: 9
    diagram: |
      graph TD
      A[Inbound Call Spike] --> B[Amazon Connect]
      B --> C{API Gateway Proxy}
      C -->|20 Concurrent Hits| D[Provisioned Concurrency Pool: Sub-millisecond Response]
      C -->|Excess Hits| E[Standard Execution: Standard Cold Start]

  - id: q14
    type: multiple_choice
    question: "You are designing an integration between Amazon Connect and a third-party CRM using AWS Lambda. Following Spec-Driven Development (SDD) principles, how should you declare the response contract so that Amazon Connect can parse it correctly without throwing an error?"
    code: |
      // Expected return contract format for Amazon Connect
      exports.handler = async (event) => {
          const crmData = await fetchCrmData(event);
          
          // Which format must the return object strictly follow?
          return ???;
      };
    options:
      - text: "{ statusCode: 200, body: JSON.stringify(crmData) }"
        is_correct: false
      - text: "crmData // A flat, single-level key-value pair object of strings (e.g., { name: 'John', id: '123' })"
        is_correct: true
      - text: "{ data: { user: crmData } }"
        is_correct: false
      - text: "An array of JSON objects representing rows from the CRM database."
        is_correct: false
    explanation: "Amazon Connect expects an AWS Lambda function to return a flat JSON object consisting exclusively of single-level key-value pairs where the values are strings. Nested JSON objects, arrays, or standard API Gateway wrappers ({statusCode, body}) will cause the Contact Flow parsing engine to fail and route to the Error branch."
    tags: [aws-lambda, amazon-connect, integration, spec-driven-development]
    difficulty: hard
    points: 9

