  - id: q08
    type: multiple_choice
    question: "Your Lambda integration needs to write customer interaction logs into Amazon DynamoDB. To prevent cold starts and connection starvation under intense spikes of concurrent customer calls, how should the DynamoDB client be initialized?"
    code: |
      // Select the optimal architectural placement for the SDK initialization
      const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
      // PLACEHOLDER A
      
      exports.handler = async (event) => {
        // PLACEHOLDER B
        return { success: true };
      };
    options:
      - text: "Initialize the client in PLACEHOLDER A (Globally / Outside the handler execution scope)."
        is_correct: true
      - text: "Initialize the client in PLACEHOLDER B (Locally / Inside the handler execution scope)."
        is_correct: false
      - text: "Dynamically re-instantiate the client for every distinct database row read operation."
        is_correct: false
      - text: "Avoid initialization by writing direct unauthenticated HTTP raw requests into DynamoDB endpoints."
        is_correct: false
    explanation: "Initializing clients outside the handler scope (PLACEHOLDER A) leverages AWS Lambda container reuse. This drastically reduces cold start latency and prevents exhausting TCP socket resources across rapid executions."
    tags: [aws-lambda, optimization, performance, dynamodb]
    difficulty: hard
    points: 8

  - id: q09
    type: multiple_choice
    question: "A Senior Applications Engineer is troubleshooting a bug during the 'Hyper-care' phase where an external API endpoint intermittently fails with 503 Service Unavailable errors. Which architectural resiliency pattern should be integrated into the AWS Lambda function code?"
    code: |
      // Resiliency implementation strategy
      async function callExternalVendor(payload) {
        return await retryPolicy({
          action: () => axios.post(process.env.API_URL, payload),
          retries: 3,
          strategy: '???'
        });
      }
    options:
      - text: "Immediate execution retry loops with zero delays."
        is_correct: false
      - text: "Exponential backoff with jitter."
        is_correct: true
      - text: "Failover routing to a secondary regional static HTML error page."
        is_correct: false
      - text: "Terminating the Lambda host environment instantly via process.exit()."
        is_correct: false
    explanation: "Exponential backoff with jitter spaced out retries prevents a cascading failure pattern known as the 'thundering herd' problem, allowing the struggling upstream target system an opportunity to recover."
    tags: [resiliency, integration, error-handling, hyper-care]
    difficulty: medium
    points: 8

