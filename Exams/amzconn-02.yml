  - id: q22
    type: multiple_choice
    question: "A company requires its Amazon Connect instance to handle outbound SMS notifications asynchronously. The engineering team implements an event-driven architecture where an AWS Lambda function processes messages from an Amazon SQS queue and triggers the Amazon Pinpoint API. If the Pinpoint API experiences a brief outage, how should the queue configuration handle retries gracefully without dropping messages?"
    code: |
      # AWS CloudFormation/Terraform Concept
      # SQS Queue Definition
      resource "aws_sqs_queue" "sms_queue" {
        name                      = "contact-center-sms-queue"
        redrive_policy = jsonencode({
          deadLetterTargetArn = aws_sqs_queue.sms_dlq.arn
          maxReceiveCount     = 5
        })
      }
    options:
      - text: "Set a high visibility timeout and utilize a Dead Letter Queue (DLQ) with a maxReceiveCount threshold."
        is_correct: true
      - text: "Convert the SQS queue to a standard FIFO queue and disable message deduplication."
        is_correct: false
      - text: "Increase the Lambda function execution timeout to match the total SQS message retention period."
        is_correct: false
      - text: "Force the Lambda function to delete messages from the queue immediately upon receipt before invocation."
        is_correct: false
    explanation: "Using a Dead Letter Queue (DLQ) paired with a reasonable visibility timeout ensures that transient API failures allow messages to be safely retried up to `maxReceiveCount` times before isolation, preventing data loss."
    tags: [event-driven, sqs, resiliency, cloud-engineering]
    difficulty: medium
    points: 8
    diagram: |
