questions:
  - id: q001
    type: multiple_choice
    question: |
      A retail company wants to implement a system that can mimic human intelligence to perform tasks such as visual perception, speech recognition, and decision-making. Which broad field of computer science describes this overarching capability?
    options:
      - text: Artificial Intelligence (AI)
        is_correct: true
      - text: Robotic Process Automation (RPA)
        is_correct: false
      - text: Statistical Forecasting
        is_correct: false
      - text: Data Warehousing
        is_correct: false
    explanation: |
      Correct: Artificial Intelligence (AI) is the broad field of computer science dedicated to creating systems capable of performing tasks that typically require human intelligence.
      Incorrect: RPA focuses on automating repetitive rule-based tasks rather than mimicking intelligence. Statistical forecasting is a subset of data analysis. Data warehousing is a storage strategy, not a field of intelligence.
    diagram: |
      graph LR
        CS[Computer Science] --> AI[Artificial Intelligence]
        AI --> ML[Machine Learning]
        ML --> DL[Deep Learning]

  - id: q002
    type: multiple_choice
    question: |
      An e-commerce platform uses a system that improves its product recommendations automatically over time by identifying patterns in historical user purchase data without being explicitly programmed for every scenario. Which concept does this represent?
    options:
      - text: Hard-coded Logic
        is_correct: false
      - text: Machine Learning (ML)
        is_correct: true
      - text: Database Indexing
        is_correct: false
      - text: Static Scripting
        is_correct: false
    explanation: |
      Correct: Machine Learning is a subset of AI that uses algorithms to parse data, learn from it, and make predictions or decisions based on patterns without explicit programming.
      Incorrect: Hard-coded logic and static scripting do not learn from data. Database indexing is a performance optimization for data retrieval.
    diagram: |
      graph LR
        Data[Historical Data] --> Algo[ML Algorithm]
        Algo --> Patterns[Pattern Recognition]
        Patterns --> Improv[Improved Accuracy]

  - id: q003
    type: multiple_choice
    question: |
      A technology firm is developing an autonomous vehicle system that uses multi-layered architectures to process high-dimensional sensory data. This approach is inspired by the structure of the human brain. Which subset of AI are they using?
    options:
      - text: Linear Regression
        is_correct: false
      - text: Deep Learning (DL)
        is_correct: true
      - text: Bayesian Networks
        is_correct: false
      - text: Heuristic Search
        is_correct: false
    explanation: |
      Correct: Deep Learning is a subset of ML based on artificial neural networks with multiple layers (deep) that can learn complex patterns from large amounts of data.
      Incorrect: Linear regression is a simple statistical method. Bayesian networks are probabilistic models. Heuristic search is a problem-solving technique not necessarily involving layered learning.
    diagram: |
      graph TD
        Input[Input Layer] --> H1[Hidden Layer 1]
        H1 --> H2[Hidden Layer 2]
        H2 --> Output[Output Layer]

  - id: q004
    type: multiple_choice
    question: |
      A developer is building a model that consists of interconnected nodes organized into input, hidden, and output layers to recognize complex patterns. What is the technical name for this computational structure?
    options:
      - text: Decision Tree
        is_correct: false
      - text: Neural Networks
        is_correct: true
      - text: Support Vector Machine
        is_correct: false
      - text: K-Nearest Neighbors
        is_correct: false
    explanation: |
      Correct: Neural networks are computing systems inspired by the biological neural networks that constitute animal brains, using interconnected nodes to process information.
      Incorrect: Decision trees use a branching flow. SVMs and KNN are specific ML algorithms that do not inherently use the layered node structure of neural networks.
    diagram: |
      graph LR
        N1((Node)) --- N2((Node))
        N1 --- N3((Node))
        N2 --- N4((Node))
        N3 --- N4((Node))

  - id: q005
    type: multiple_choice
    question: |
      A manufacturing company implements a system that automatically detects defects in products on a high-speed assembly line by analyzing live video feeds. Which AI capability is being utilized here?
    options:
      - text: Computer Vision
        is_correct: true
      - text: Predictive Maintenance
        is_correct: false
      - text: Sentiment Analysis
        is_correct: false
      - text: Speech-to-Text
        is_correct: false
    explanation: |
      Correct: Computer Vision is the field of AI that enables computers and systems to derive meaningful information from digital images, videos, and other visual inputs.
      Incorrect: Predictive maintenance uses sensor data (telemetry). Sentiment analysis and Speech-to-Text deal with text and audio, respectively.
    diagram: |
      graph LR
        Image[Image/Video] --> CV[Computer Vision Model]
        CV --> Detect[Object Detection/Defect]

  - id: q006
    type: multiple_choice
    question: |
      A customer service department wants to deploy a chatbot that can understand, interpret, and respond to customer inquiries written in various languages. Which AI technology should they focus on?
    options:
      - text: Natural Language Processing (NLP)
        is_correct: true
      - text: Generative Adversarial Networks
        is_correct: false
      - text: Edge Computing
        is_correct: false
      - text: Reinforcement Learning
        is_correct: false
    explanation: |
      Correct: NLP is the branch of AI that gives computers the ability to understand text and spoken words in much the same way human beings can.
      Incorrect: GANs are used for generating new data (like images). Edge computing is a deployment architecture. Reinforcement learning is a training paradigm based on rewards.
    diagram: |
      graph LR
        Text[Human Text] --> NLP[NLP Engine]
        NLP --> Intent[Identify Intent]
        NLP --> Entity[Extract Entities]

  - id: q007
    type: multiple_choice
    question: |
      After a data scientist has selected an algorithm and provided it with data, the resulting artifact can be used to make predictions on new, unseen data. What is this artifact called?
    options:
      - text: Dataset
        is_correct: false
      - text: Model
        is_correct: true
      - text: Feature
        is_correct: false
      - text: Hyperparameter
        is_correct: false
    explanation: |
      Correct: A model is the output of a machine learning algorithm run on data; it represents what was learned and is used to make predictions.
      Incorrect: A dataset is the input. A feature is an individual measurable property. A hyperparameter is a configuration setting for the algorithm.
    diagram: |
      graph LR
        Algo[Algorithm] + Data[Data] --> Model[Trained Model]
        NewData[New Data] --> Model --> Pred[Prediction]

  - id: q008
    type: multiple_choice
    question: |
      A software engineer is writing a specific set of step-by-step instructions for a computer to follow to solve a mathematical problem or complete a task. What is this set of instructions called?
    options:
      - text: Algorithm
        is_correct: true
      - text: Neural Layer
        is_correct: false
      - text: Inference Engine
        is_correct: false
      - text: Training Set
        is_correct: false
    explanation: |
      Correct: An algorithm is a finite sequence of well-defined, computer-implementable instructions, typically to solve a class of specific problems or to perform a computation.
      Incorrect: Neural layers are components of a model. Inference engines apply models to data. Training sets are data used to build models.
    diagram: |
      graph TD
        Start(Start) --> Step1[Step 1]
        Step1 --> Step2[Step 2]
        Step2 --> End(End)

  - id: q009
    type: multiple_choice
    question: |
      In the machine learning lifecycle, what are the two distinct phases: first, where the model learns from data, and second, where the model is used to make real-time predictions?
    options:
      - text: Labeling and Cleaning
        is_correct: false
      - text: Training and Inferencing
        is_correct: true
      - text: Encoding and Decoding
        is_correct: false
      - text: Validation and Testing
        is_correct: false
    explanation: |
      Correct: Training is the process of teaching the model, while inferencing is the process of using the trained model to make predictions on new data.
      Incorrect: Labeling/Cleaning are data prep steps. Encoding/Decoding are data transformation steps. Validation/Testing are evaluation steps.
    diagram: |
      graph LR
        subgraph Phase 1
        Data[Data] --> Train[Training] --> Model[Model]
        end
        subgraph Phase 2
        New[New Input] --> Infer[Inferencing] --> Output[Result]
        end

  - id: q010
    type: multiple_choice
    question: |
      A financial institution notices that their loan approval model consistently favors one demographic group over another because the historical data used was unrepresentative. What is this phenomenon called?
    options:
      - text: Variance
        is_correct: false
      - text: Bias
        is_correct: true
      - text: Overfitting
        is_correct: false
      - text: Regularization
        is_correct: false
    explanation: |
      Correct: Bias in AI refers to systematic errors in a model's predictions, often caused by prejudiced or unrepresentative training data, leading to unfair outcomes.
      Incorrect: Variance refers to model sensitivity to small fluctuations. Overfitting is when a model learns noise. Regularization is a technique to prevent overfitting.
    diagram: |
      graph TD
        D[Historical Data] -->|Contains Prejudice| M[Model]
        M -->|Systematic Error| O[Biased Output]

  - id: q011
    type: multiple_choice
    question: |
      When developing an AI system for hiring, an organization ensures that the model provides similar outcomes for individuals with similar qualifications, regardless of protected characteristics. Which principle are they applying?
    options:
      - text: Fairness
        is_correct: true
      - text: Scalability
        is_correct: false
      - text: Latency
        is_correct: false
      - text: Precision
        is_correct: false
    explanation: |
      Correct: Fairness in AI involves ensuring that models do not discriminate and that they treat all groups or individuals equitably.
      Incorrect: Scalability refers to handling growth. Latency refers to speed. Precision is a specific accuracy metric.
    diagram: |
      graph LR
        GroupA[Group A] --> Model[Fair Model]
        GroupB[Group B] --> Model
        Model --> Equal[Equitable Treatment]

  - id: q012
    type: multiple_choice
    question: |
      A data scientist evaluates a model and finds it performs exceptionally well on training data but fails to generalize to new, real-world data. What term describes how well the model matches the data?
    options:
      - text: Fit
        is_correct: true
      - text: Batching
        is_correct: false
      - text: Tuning
        is_correct: false
      - text: Sharding
        is_correct: false
    explanation: |
      Correct: Fit refers to how well a machine learning model approximates the underlying patterns of the data (e.g., Underfitting or Overfitting).
      Incorrect: Batching is a data processing method. Tuning is the process of optimization. Sharding is a database partitioning technique.
    diagram: |
      graph TD
        U[Underfitting: Too Simple]
        O[Overfitting: Too Complex]
        G[Good Fit: Balanced]

  - id: q013
    type: multiple_choice
    question: |
      A company is using Amazon Bedrock to access a foundation model that has been trained on massive datasets to generate human-like text, summarize documents, and write code. What type of model is this?
    options:
      - text: Convolutional Neural Network (CNN)
        is_correct: false
      - text: Large Language Model (LLM)
        is_correct: true
      - text: Decision Forest
        is_correct: false
      - text: Clustering Model
        is_correct: false
    explanation: |
      Correct: Large Language Models (LLMs) are AI models trained on vast amounts of text data, capable of understanding and generating natural language across various tasks.
      Incorrect: CNNs are primarily for images. Decision Forests are for tabular classification/regression. Clustering models are for grouping unlabeled data.
    diagram: |
      graph LR
        BigData[Vast Text Data] --> Train[Massive Training]
        Train --> LLM[LLM]
        LLM --> Gen[Generate/Summarize/Code]

  - id: q014
    type: multiple_choice
    question: |
      A data scientist is preparing a dataset for a supervised learning project where the goal is to predict if an email is 'Spam' or 'Not Spam'. Each email in the dataset has been manually tagged with the correct category. What type of data does this represent?
    options:
      - text: Labeled data
        is_correct: true
      - text: Unlabeled data
        is_correct: false
      - text: Synthetic data
        is_correct: false
      - text: Metadata
        is_correct: false
    explanation: |
      Correct: Labeled data consists of input data paired with the correct output (label), which is essential for supervised learning tasks like classification.
      Incorrect: Unlabeled data lacks the target tag. Synthetic data is artificially generated. Metadata is data about data (like file size) rather than the content used for training.
    diagram: |
      graph LR
        Input[Email Content] --> Label[Tag: Spam]
        Input2[Email Content] --> Label2[Tag: Not Spam]
        subgraph Dataset
        Input
        Label
        end

  - id: q015
    type: multiple_choice
    question: |
      A financial analyst is working with a dataset stored in a relational database. The data is organized into rows and columns, containing customer IDs, transaction amounts, and dates. What is the most accurate term for this data format?
    options:
      - text: Unstructured data
        is_correct: false
      - text: Tabular data
        is_correct: true
      - text: Natural language data
        is_correct: false
      - text: Binary data
        is_correct: false
    explanation: |
      Correct: Tabular data is organized in a table format with rows (observations) and columns (features), common in spreadsheets and SQL databases.
      Incorrect: Unstructured data lacks a pre-defined model. Natural language data refers to free-form text. Binary data refers to encoded files like images or executables.
    diagram: |
      classDiagram
        class Table {
            Row 1: Cust_ID, Amt
            Row 2: Cust_ID, Amt
            Row 3: Cust_ID, Amt
        }

  - id: q016
    type: multiple_choice
    question: |
      An energy company uses sensors to record electricity consumption at 15-minute intervals over several months to predict future demand. What type of data are they collecting?
    options:
      - text: Geospatial data
        is_correct: false
      - text: Time-series data
        is_correct: true
      - text: Categorical data
        is_correct: false
      - text: Image data
        is_correct: false
    explanation: |
      Correct: Time-series data is a sequence of data points recorded at specific, successive time intervals, used to track changes over time.
      Incorrect: Geospatial data relates to physical locations. Categorical data represents discrete groups. Image data consists of pixel values.
    diagram: |
      graph LR
        T1[10:00 AM: 50kW] --> T2[10:15 AM: 55kW]
        T2 --> T3[10:30 AM: 48kW]
        T3 --> T4[Time Sequence]

  - id: q017
    type: multiple_choice
    question: |
      A healthcare provider is training a deep learning model to identify fractures in X-ray files stored in Amazon S3. Which data type is the model primarily processing?
    options:
      - text: Text data
        is_correct: false
      - text: Tabular data
        is_correct: false
      - text: Image data
        is_correct: true
      - text: Audio data
        is_correct: false
    explanation: |
      Correct: Image data consists of visual information represented as a grid of pixels, commonly used in computer vision tasks.
      Incorrect: Text, tabular, and audio data represent words, structured numbers, and sound waves, respectively, which do not apply to X-ray visuals.
    diagram: |
      graph LR
        Xray[X-Ray File] --> Pixels[Pixel Grid]
        Pixels --> CNN[Computer Vision Model]
        CNN --> Result[Fracture Detected]

  - id: q018
    type: multiple_choice
    question: |
      A marketing team wants to analyze thousands of customer reviews from social media to understand brand sentiment. What is the primary type of data involved in this Natural Language Processing (NLP) task?
    options:
      - text: Text data
        is_correct: true
      - text: Numerical data
        is_correct: false
      - text: Structured data
        is_correct: false
      - text: Time-series data
        is_correct: false
    explanation: |
      Correct: Text data consists of sequences of characters and words, which is the foundational input for NLP models.
      Incorrect: Numerical data refers to numbers. Structured data refers to data in fixed fields. While reviews have a timestamp, the core content for sentiment analysis is text.
    diagram: |
      graph LR
        Review["I love this product!"] --> Tokens[Tokens: I, love, this...]
        Tokens --> Sentiment[Positive Sentiment]

  - id: q019
    type: multiple_choice
    question: |
      A data engineer is managing a collection of PDF documents, video files, and call recordings. How is this data best classified compared to data found in a traditional SQL database?
    options:
      - text: Structured and Semi-structured
        is_correct: false
      - text: Unstructured and Structured
        is_correct: true
      - text: Tabular and Relational
        is_correct: false
      - text: Quantitative and Qualitative
        is_correct: false
    explanation: |
      Correct: PDFs and videos are "unstructured" (no fixed schema), while SQL databases contain "structured" data (highly organized).
      Incorrect: Tabular/Relational both refer to structured data. Quantitative/Qualitative refers to the nature of the information rather than its technical structure.
    diagram: |
      graph TD
        subgraph Unstructured
        PDF[PDFs]
        VID[Videos]
        end
        subgraph Structured
        DB[(SQL Database)]
        end

  - id: q020
    type: multiple_choice
    question: |
      A financial company is building a model to predict house prices based on features like square footage, number of bedrooms, and location. They provide the model with a dataset where each house's features are paired with its actual historical sale price. What type of machine learning is this?
    options:
      - text: Supervised learning
        is_correct: true
      - text: Unsupervised learning
        is_correct: false
      - text: Reinforcement learning
        is_correct: false
      - text: Clustering
        is_correct: false
    explanation: |
      Correct: Supervised learning involves training a model on a labeled dataset, where the algorithm learns the mapping from inputs to known outputs (labels).
      Incorrect: Unsupervised learning deals with unlabeled data. Reinforcement learning is based on rewards/penalties. Clustering is a specific type of unsupervised learning.
    diagram: |
      graph LR
        Data[Input + Label] --> Model[Supervised Model]
        Model --> Pred[Predicted Label]

  - id: q021
    type: multiple_choice
    question: |
      A marketing agency has a large dataset of customer purchase histories but no predefined categories or labels. They want to use an AI model to automatically group customers with similar buying behaviors for targeted ads. Which machine learning approach is most appropriate?
    options:
      - text: Supervised learning
        is_correct: false
      - text: Unsupervised learning
        is_correct: true
      - text: Reinforcement learning
        is_correct: false
      - text: Regression
        is_correct: false
    explanation: |
      Correct: Unsupervised learning finds hidden patterns or intrinsic structures in input data that does not have historical labels or outcomes attached.
      Incorrect: Supervised learning requires labels. Reinforcement learning requires an environment/reward system. Regression is a supervised learning task for predicting continuous values.
    diagram: |
      graph TD
        Raw[Unlabeled Data] --> Algo[Unsupervised Algo]
        Algo --> C1[Cluster 1]
        Algo --> C2[Cluster 2]

  - id: q022
    type: multiple_choice
    question: |
      An engineering team is developing a model to navigate an autonomous drone. The model learns by receiving "points" when it successfully avoids an obstacle and "penalties" when it crashes. Over many iterations, the drone improves its flight path. What type of learning is being used?
    options:
      - text: Supervised learning
        is_correct: false
      - text: Semi-supervised learning
        is_correct: false
      - text: Reinforcement learning
        is_correct: true
      - text: Dimensionality reduction
        is_correct: false
    explanation: |
      Correct: Reinforcement learning is a paradigm where an agent learns to make decisions by performing actions in an environment to maximize cumulative rewards.
      Incorrect: Supervised learning requires a teacher (labels). Semi-supervised uses a mix of labeled/unlabeled data. Dimensionality reduction is an unsupervised technique to reduce features.
    diagram: |
      graph LR
        Agent[Agent/Drone] -->|Action| Env[Environment]
        Env -->|Reward/Penalty| Agent
        Env -->|New State| Agent        

  - id: q023
    type: multiple_choice
    question: |
      A medical imaging center is using an AI model to highlight potential anomalies in X-rays for radiologists to review. The final diagnosis is always made by the doctor, but the AI helps prioritize urgent cases. Which AI value proposition does this best represent?
    options:
      - text: Fully autonomous operation
        is_correct: false
      - text: Assisting human decision-making
        is_correct: true
      - text: Replacing specialized workforce
        is_correct: false
      - text: Eliminating the need for data privacy
        is_correct: false
    explanation: |
      Correct: AI can provide value by acting as an "augmented intelligence" tool that assists humans in making faster, more informed decisions without replacing human oversight.
      Incorrect: The scenario describes a human-in-the-loop process, not full autonomy. AI is meant to support, not necessarily replace, experts. Data privacy remains critical in all AI applications.
    diagram: |
      graph LR
        Data[Medical Image] --> AI[AI Analysis]
        AI --> Flags[Highlighted Anomalies]
        Flags --> Doc[Radiologist Review]
        Doc --> Decision[Final Diagnosis]

  - id: q024
    type: multiple_choice
    question: |
      A global streaming service needs to provide personalized movie recommendations to millions of users simultaneously. Why is Machine Learning preferred over a manual rule-based system for this specific requirement?
    options:
      - text: Solution scalability
        is_correct: true
      - text: Lower initial development cost
        is_correct: false
      - text: Guaranteed 100% accuracy
        is_correct: false
      - text: Reduced need for cloud storage
        is_correct: false
    explanation: |
      Correct: ML models can scale to handle massive amounts of data and users, adapting to complex patterns that would be impossible for humans to manage via manual rules.
      Incorrect: ML often requires higher upfront investment in data and training. No ML model guarantees 100% accuracy. Large-scale ML typically increases rather than reduces storage needs.
    diagram: |
      graph TD
        Users[Millions of Users] --> Model[ML Recommendation Model]
        Model --> P1[User A: Sci-Fi]
        Model --> P2[User B: Drama]
        Model --> P3[User N: Comedy]

  - id: q025
    type: multiple_choice
    question: |
      A logistics company implements an AI-powered system that automatically sorts thousands of incoming packages by reading handwritten addresses and routing them to the correct delivery zones. What is the primary benefit of this application?
    options:
      - text: Automation of repetitive tasks
        is_correct: true
      - text: Increased hardware lifespan
        is_correct: false
      - text: Manual data entry verification
        is_correct: false
      - text: Improved physical security
        is_correct: false
    explanation: |
      Correct: AI provides significant value by automating high-volume, repetitive manual tasks (like reading handwriting), increasing efficiency and reducing human error.
      Incorrect: AI software does not inherently increase the lifespan of physical hardware. The goal here is to remove manual entry, not verify it manually. While it improves efficiency, it is not a security-focused application.
    diagram: |
      graph LR
        Pkg[Incoming Package] --> OCR[AI Handwriting Recognition]
        OCR --> Route[Automatic Routing]
        Route --> Zone[Delivery Zone]

  - id: q026
    type: multiple_choice
    question: |
      A small startup is considering building a custom deep learning model to automate a simple data entry task that occurs only once a month and takes a human 10 minutes to complete. After evaluating the costs of data collection, GPU instances for training, and engineering time, they decide not to proceed. Which factor primarily influenced this decision?
    options:
      - text: Cost-benefit analysis
        is_correct: true
      - text: Model latency
        is_correct: false
      - text: Data sovereignty
        is_correct: false
      - text: Overfitting
        is_correct: false
    explanation: |
      Correct: A cost-benefit analysis involves weighing the total cost of developing and maintaining an AI solution against the actual value or time savings it provides. In this case, the manual effort is too low to justify the high development cost.
      Incorrect: Latency refers to inference speed, which isn't a concern for a monthly task. Data sovereignty relates to legal data locations. Overfitting is a technical training error, not a business viability factor.
    diagram: |
      graph TD
        Cost[High Development Cost] vs[vs] Value[Low Manual Effort]
        Cost --> Decision{Not Appropriate}
        Value --> Decision

  - id: q027
    type: multiple_choice
    question: |
      An accounting firm needs a tool to calculate the exact tax liability for its clients based on current fixed legal formulas and tax brackets. Why would a traditional rule-based software program be more appropriate than a Machine Learning model for this task?
    options:
      - text: ML models cannot handle numerical data found in tax documents.
        is_correct: false
      - text: A specific, deterministic outcome is needed instead of a prediction.
        is_correct: true
      - text: Traditional software is always more secure than AI-based solutions.
        is_correct: false
      - text: ML models require constant internet connectivity for calculations.
        is_correct: false
    explanation: |
      Correct: AI/ML is probabilistic and based on patterns, making it unsuitable for tasks requiring 100% mathematical precision based on rigid, deterministic legal rules where "almost correct" is not acceptable.
      Incorrect: ML models excel at numerical data. Security depends on implementation, not the logic type. ML models can run offline (on-device) just as easily as traditional software.
    diagram: |
      graph LR
        Logic[Fixed Legal Formula] --> Method{Choose Method}
        Method -->|Deterministic| Rule[Traditional Code/Rules]
        Method -->|Probabilistic| ML[Machine Learning]
        Rule --> Result[100% Exact Result]

  - id: q028
    type: multiple_choice
    question: |
      A real estate platform wants to build a feature that predicts the specific market value of a house in dollars based on its square footage, age, and location. Which machine learning technique is most appropriate for predicting this continuous numerical value?
    options:
      - text: Regression
        is_correct: true
      - text: Classification
        is_correct: false
      - text: Clustering
        is_correct: false
      - text: Dimensionality Reduction
        is_correct: false
    explanation: |
      Correct: Regression is used when the target variable is a continuous numerical value, such as a price, temperature, or stock value.
      Incorrect: Classification is for discrete categories. Clustering is an unsupervised technique for grouping data without labels. Dimensionality reduction is used to simplify features.
    diagram: |
      graph LR
        Features[Size, Age, Zip] --> Model[Regression Model]
        Model --> Value[$450,000]

  - id: q029
    type: multiple_choice
    question: |
      A bank is developing a system to automatically sort incoming customer emails into three specific folders: "Billing," "Technical Support," and "General Inquiry." Which machine learning technique should be used to assign these discrete labels?
    options:
      - text: Regression
        is_correct: false
      - text: Classification
        is_correct: true
      - text: Clustering
        is_correct: false
      - text: Reinforcement Learning
        is_correct: false
    explanation: |
      Correct: Classification is a supervised learning technique used to categorize data into predefined, discrete classes or labels.
      Incorrect: Regression predicts continuous numbers, not categories. Clustering creates its own groups without predefined labels. Reinforcement learning focuses on decision-making through rewards.
    diagram: |
      graph TD
        Email[Incoming Email] --> Model[Classification Model]
        Model --> B[Billing]
        Model --> T[Tech Support]
        Model --> G[General]

  - id: q030
    type: multiple_choice
    question: |
      A retail company has a large database of customer transaction history but no specific labels for their behavior. They want to identify distinct groups of customers with similar shopping habits for targeted marketing. Which technique is most suitable?
    options:
      - text: Regression
        is_correct: false
      - text: Binary Classification
        is_correct: false
      - text: Clustering
        is_correct: true
      - text: Time-series Forecasting
        is_correct: false
    explanation: |
      Correct: Clustering is an unsupervised learning technique used to find natural groupings or patterns in data without pre-existing labels.
      Incorrect: Regression and Classification are supervised and require labels. Forecasting predicts future values in a sequence.
    diagram: |
      graph LR
        Data[Unlabeled Customers] --> Model[Clustering]
        Model --> G1[Group: Big Spenders]
        Model --> G2[Group: Occasional Buyers]

  - id: q031
    type: multiple_choice
    question: |
