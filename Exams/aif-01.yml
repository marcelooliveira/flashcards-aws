        M[Model] --> C1[Security Check]
        C1 --> C2[Latency Test]
        C2 --> C3[Rollback Plan]
        C3 --> Ready[Production Ready]

  - id: q059
    type: multiple_choice
    question: |
      A team observes that their customer churn model is increasingly missing new types of churn behavior that didn't exist a year ago. What MLOps process is needed to fix this?
    options:
      - text: Model re-training
        is_correct: true
      - text: Data collection only
        is_correct: false
      - text: Changing the API key
        is_correct: false
      - text: Increasing CPU power
        is_correct: false
    explanation: |
