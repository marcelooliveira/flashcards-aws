  - id: q056
    type: multiple_choice
    question: |
      An e-commerce site needs its recommendation engine to handle a 10x increase in traffic during Black Friday without crashing or slowing down. This requirement refers to:
    options:
      - text: Model Interpretability
        is_correct: false
      - text: Scalable systems
        is_correct: true
      - text: Data Cleaning
        is_correct: false
      - text: Model Versioning
