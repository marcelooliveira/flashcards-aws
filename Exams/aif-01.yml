      - text: Model Drift
        is_correct: false
      - text: Inference Latency
        is_correct: false
    explanation: |
      Correct: Technical debt represents the future cost of rework caused by choosing an easy or suboptimal solution now instead of a better approach that would take longer.
      Incorrect: Capex is a financial term. Drift is a performance issue. Latency is a speed metric.
