  - id: q065
    type: multiple_choice
    question: |
      After launching a recommendation engine, a company notices that app ratings have increased from 3.5 to 4.2 stars, and users are leaving positive comments about the "personalized feel." This is:
    options:
      - text: Return on Investment (ROI)
        is_correct: false
      - text: Accuracy
        is_correct: false
      - text: Customer feedback
        is_correct: true
      - text: Data Drift
        is_correct: false
    explanation: |
      Correct: Customer feedback provides qualitative and quantitative (ratings) evidence of how users perceive the value of an AI feature.
      Incorrect: ROI is financial. Accuracy is a mathematical model metric. Drift is a negative technical phenomenon.
