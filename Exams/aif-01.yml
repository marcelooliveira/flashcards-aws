  - id: q060
    type: multiple_choice
    question: |
      In a binary classification model for spam detection, what is the metric that measures the percentage of total predictions that were correct?
    options:
      - text: Accuracy
        is_correct: true
      - text: F1 Score
        is_correct: false
      - text: Area Under the Curve (AUC)
        is_correct: false
      - text: Latency
        is_correct: false
    explanation: |
      Correct: Accuracy is the ratio of correct predictions to the total number of input samples.
      Incorrect: F1 Score balances precision and recall. AUC measures the ability to distinguish between classes. Latency is speed.
    diagram: |
      graph TD
        A[Accuracy = ]
        B[Correct Predictions / Total Predictions]

  - id: q061
    type: multiple_choice
    question: |
      Which metric provides a single value that represents a model's performance across all possible classification thresholds, specifically its ability to distinguish between positive and negative classes?
    options:
      - text: Recall
        is_correct: false
      - text: Accuracy
        is_correct: false
      - text: Area Under the Curve (AUC)
        is_correct: true
      - text: Mean Absolute Error (MAE)
        is_correct: false
    explanation: |
      Correct: AUC (of the ROC curve) measures how well the model discriminates between classes. A higher AUC means the model is better at predicting 0s as 0s and 1s as 1s.
      Incorrect: MAE is for regression. Accuracy can be misleading in imbalanced datasets. Recall only looks at positive samples.
    diagram: |
      graph LR
        Curve[ROC Curve] --> Calc[Calculate Area]
        Calc --> AUC[AUC Value 0.0 to 1.0]

  - id: q062
    type: multiple_choice
    question: |
      A team is evaluating a fraud detection model. They need to balance the need to catch as many frauds as possible (Recall) with the need to avoid annoying innocent customers (Precision). Which combined metric should they use?
    options:
      - text: F1 Score
        is_correct: true
      - text: RMSE
        is_correct: false
      - text: R-Squared
        is_correct: false
      - text: Bias
        is_correct: false
    explanation: |
      Correct: The F1 score is the harmonic mean of precision and recall, providing a single metric that balances both.
      Incorrect: RMSE and R-Squared are for regression. Bias is an error type, not a performance metric.
    diagram: |
      graph TD
        P[Precision] --> F1[F1 Score]
        R[Recall] --> F1

