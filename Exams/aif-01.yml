        is_correct: false
    explanation: |
      Correct: Cost per user helps determine the financial efficiency of a service as it scales.
      Incorrect: ROI measures total profit vs. total cost. Development cost is the upfront build cost. Feedback is qualitative data.
    diagram: |
      graph TD
        Total[Total Monthly Cost] / Users[Active Users] --> CPU[Cost Per User]

  - id: q064
    type: multiple_choice
    question: |
      A manager is calculating the total expense of data scientists' salaries, compute resources for training, and data labeling services for a six-month project. This represents:
    options:
      - text: Return on Investment (ROI)
        is_correct: false
      - text: Development costs
        is_correct: true
      - text: Model Latency
        is_correct: false
      - text: Customer churn rate
        is_correct: false
    explanation: |
      Correct: Development costs include all the resources (human and technical) required to build the initial model.
      Incorrect: ROI is the gain from the investment. Latency and churn are performance/business outcomes, not build costs.
